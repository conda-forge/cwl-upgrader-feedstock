{% set name = "cwl-upgrader" %}
{% set version = "1.2.15" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: bb9e098ba6d1cc82c36dff1cbaad6779d6d9beab5324cf44a121d7faf7d58672

build:
  noarch: python
  entry_points:
    - cwl-upgrader = cwlupgrader.main:main
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - setuptools
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - ruamel.yaml >=0.16.0,<0.19
    - schema-salad
    - setuptools

test:
  imports:
    - cwlupgrader
  commands:
    - pip check
    - cwl-upgrader --help
    - python -m pytest -n auto --pyargs cwlupgrader
  requires:
    - pip
    - pytest-xdist
    - python {{ python_min }}

about:
  home: https://github.com/common-workflow-language/cwl-upgrader
  license: Apache-2.0
  license_file:
    - LICENSE.txt
  summary: This is a standalone upgrader for Common Workflow Language documents from version draft-3, v1.0, and v1.1 to v1.2
  dev_url: https://github.com/common-workflow-language/cwl-upgrader

extra:
  recipe-maintainers:
    - mr-c
    - kinow
